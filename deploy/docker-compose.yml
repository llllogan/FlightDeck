services:
  flightdeck:
    image: ${APP_IMAGE}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      DATABASE_URL: file:/data/flightdeck.db
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
    volumes:
      - flightdeck-data:/data

volumes:
  flightdeck-data:
